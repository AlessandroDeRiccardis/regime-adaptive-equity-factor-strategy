name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality and reproducibility
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: make lint

      - name: Check formatting
        run: python -m black --check src scripts tests

      - name: Test
        run: make test

      - name: Reproduce synthetic research pipeline
        run: make reproduce
